<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LaKel Widget</title>
    <style>
        /* Minimal widget styles - embeddable anywhere */
        :root {
            --bg: #0d1117;
            --card: #161b22;
            --border: #30363d;
            --text: #e6edf3;
            --muted: #8b949e;
            --gold: #d4a855;
            --green: #3fb950;
            --yellow: #d29922;
            --red: #f85149;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: transparent;
        }
        .widget {
            width: 280px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px;
            font-size: 12px;
        }
        .widget-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 1px solid var(--border);
        }
        .widget-title {
            font-size: 16px;
            font-weight: 700;
            color: var(--gold);
        }
        .widget-time {
            font-size: 9px;
            color: var(--muted);
        }
        .stock-row {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 0;
            border-bottom: 1px solid var(--border);
        }
        .stock-row:last-child { border-bottom: none; }
        .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            flex-shrink: 0;
        }
        .dot.g { background: var(--green); box-shadow: 0 0 6px rgba(63,185,80,0.5); }
        .dot.y { background: var(--yellow); box-shadow: 0 0 6px rgba(210,153,34,0.5); }
        .dot.r { background: var(--red); box-shadow: 0 0 6px rgba(248,81,73,0.5); }
        .ticker {
            font-weight: 600;
            color: var(--text);
            width: 50px;
        }
        .name {
            flex: 1;
            color: var(--muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .action {
            font-size: 9px;
            font-weight: 600;
            text-transform: uppercase;
            padding: 2px 6px;
            border-radius: 3px;
        }
        .action.buy { background: rgba(63,185,80,0.2); color: var(--green); }
        .action.hold { background: rgba(210,153,34,0.2); color: var(--yellow); }
        .action.watch { background: rgba(139,148,158,0.2); color: var(--muted); }
        .section-label {
            font-size: 9px;
            color: var(--gold);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin: 12px 0 4px 0;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }
        .pulse { animation: pulse 2s infinite; }
    </style>
</head>
<body>
    <div class="widget">
        <div class="widget-header">
            <span class="widget-title">LaKel</span>
            <span class="widget-time">Feb 22, 6:00 PM</span>
        </div>

        <div class="section-label">Holdings</div>
        <div class="stock-row">
            <span class="dot y"></span>
            <span class="ticker">ASX</span>
            <span class="name">ASE Technology</span>
            <span class="action hold">Hold</span>
        </div>
        <div class="stock-row">
            <span class="dot y"></span>
            <span class="ticker">AMSC</span>
            <span class="name">Amer. Superconductor</span>
            <span class="action hold">Hold</span>
        </div>

        <div class="section-label">Buy Now</div>
        <div class="stock-row">
            <span class="dot g pulse"></span>
            <span class="ticker">LEU</span>
            <span class="name">Centrus Energy</span>
            <span class="action buy">Buy</span>
        </div>
        <div class="stock-row">
            <span class="dot g pulse"></span>
            <span class="ticker">DDOG</span>
            <span class="name">Datadog</span>
            <span class="action buy">Buy</span>
        </div>
        <div class="stock-row">
            <span class="dot g"></span>
            <span class="ticker">CCJ</span>
            <span class="name">Cameco</span>
            <span class="action buy">Buy</span>
        </div>

        <div class="section-label">Watch</div>
        <div class="stock-row">
            <span class="dot y"></span>
            <span class="ticker">VRT</span>
            <span class="name">Vertiv</span>
            <span class="action watch">Watch</span>
        </div>
        <div class="stock-row">
            <span class="dot y"></span>
            <span class="ticker">AVAV</span>
            <span class="name">AeroVironment</span>
            <span class="action watch">Watch</span>
        </div>
    </div>
</body>
</html>
